<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地址反查企业 · TYC Batch Lookup</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f5f6f8; --bg2:#eaecf0;
  --panel:#ffffff; --panel2:#f8f9fb; --panel3:#eef0f4;
  --line:#dde0e4; --line2:#cfd3d9;
  --txt:#1a1d23; --dim:#5f6672; --faint:#949da9;
  --amber:#c8860a; --amber-hi:#a06e08; --amber-dim:#fef0d0; --amber-glow:rgba(200,134,10,.1);
  --green:#1a7a40; --green-dim:#d4f5e2;
  --red:#d63c3c; --red-dim:#fde8e8;
  --blue:#2d5fc4; --blue-dim:#dce8fa;
  --mono:"SF Mono",ui-monospace,Menlo,Consolas,"Cascadia Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  --r:9px; --r-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --header-bg:rgba(245,246,248,.86);
  --row-line:#e8ebf0;
  --row-hover:rgba(0,0,0,.016);
  --skl-base:#e4e7ed; --skl-shine:#eef1f5;
  --btn-hover:#e2e5ea;
  --tab-hover:rgba(0,0,0,.03);
}


/* ============ 深色主题 ============ */
[data-theme="dark"]{
  --bg:#0d1013; --bg2:#0a0c0e;
  --panel:#151a1f; --panel2:#1b2129; --panel3:#212832;
  --line:#2a323d; --line2:#333d4a;
  --txt:#e6ecf3; --dim:#96a1af; --faint:#616b78;
  --amber:#ffb224; --amber-hi:#ffc555; --amber-dim:#7a5a15; --amber-glow:rgba(255,178,36,.14);
  --green:#4ade80; --green-dim:#1f5137;
  --red:#ff6b6b; --red-dim:#5a2626;
  --blue:#5ea2ff; --blue-dim:#1e3a5f;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.28);
  --header-bg:rgba(13,16,19,.82);
  --row-line:#1c232c;
  --row-hover:rgba(255,255,255,.018);
  --skl-base:#1c232c; --skl-shine:#252d38;
  --btn-hover:#28323e;
  --tab-hover:rgba(255,255,255,.03);
}
[data-theme="dark"] body{
  background-image:
    radial-gradient(1200px 400px at 78% -8%,var(--amber-glow),transparent 60%),
    radial-gradient(900px 500px at 10% 110%,rgba(94,162,255,.05),transparent 55%);
}
[data-theme="dark"] .logo .mark{box-shadow:0 2px 10px rgba(255,178,36,.3)}
[data-theme="dark"] .st.wait{background:var(--bg2);border-color:var(--line2)}
[data-theme="dark"] .st.run{background:rgba(94,162,255,.08)}
[data-theme="dark"] .st.ok{background:rgba(74,222,128,.08)}
[data-theme="dark"] .st.miss{background:rgba(255,178,36,.08)}
[data-theme="dark"] .st.err{background:rgba(255,107,107,.08)}
[data-theme="dark"] ::selection{background:rgba(255,178,36,.25);color:var(--txt)}
[data-theme="dark"] .tabs{background:var(--bg2);border-color:var(--line)}
[data-theme="dark"] .card>.hd{background:linear-gradient(180deg,var(--panel2),var(--panel))}
[data-theme="dark"] .tblcard>.hd{background:linear-gradient(180deg,var(--panel2),var(--panel))}

/* 主题切换按钮 */
#themeToggle{
  width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);
  background:var(--panel3);cursor:pointer;display:grid;place-items:center;
  transition:all .2s;flex:none;padding:0;
}
#themeToggle:hover{transform:scale(1.08);border-color:var(--amber)}
#themeToggle svg{width:15px;height:15px;stroke:var(--amber);fill:none;stroke-width:2;transition:all .2s}
[data-theme="dark"] #themeToggle svg{stroke:var(--dim)}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:.933rem;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

/* ============ 顶栏 ============ */
header{
  position:sticky;top:0;z-index:40;
  background:var(--header-bg);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.hbar{max-width:1560px;margin:0 auto;padding:14px 26px;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:11px}
.logo .mark{
  width:32px;height:32px;border-radius:8px;flex:none;
  background:linear-gradient(145deg,var(--amber),#e0920c);
  display:grid;place-items:center;box-shadow:0 2px 10px rgba(255,178,36,.3);
}
.logo .mark svg{width:19px;height:19px;stroke:#1a1200;fill:none;stroke-width:2}
h1{font-size:1.06rem;font-weight:650;letter-spacing:.2px}
h1 .thin{color:var(--faint);font-weight:400;margin:0 6px}
.tag{font-size:.72rem;color:var(--dim);font-family:var(--mono);border:1px solid var(--line);border-radius:5px;padding:2px 8px}
.pstat{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--dim);
  font-family:var(--mono);border:1px solid var(--line);border-radius:20px;padding:5px 13px 5px 11px}
#proxyDot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:none;transition:.2s}
#proxyDot.ok{background:var(--green);box-shadow:0 0 0 3px rgba(74,222,128,.15)}
#proxyDot.bad{background:var(--red);box-shadow:0 0 0 3px rgba(255,107,107,.15)}

/* ============ 主布局：左配置 右表格 ============ */
.layout{max-width:1560px;margin:0 auto;padding:22px 26px 60px;
  display:grid;grid-template-columns:392px minmax(0,1fr);gap:22px;align-items:start}
.side{position:sticky;top:78px;display:flex;flex-direction:column;gap:16px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card>.hd{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--panel2),var(--panel))}
.card>.hd .num{font-family:var(--mono);font-size:.72rem;color:var(--amber);font-weight:600;
  border:1px solid var(--amber-dim);border-radius:5px;padding:2px 7px;background:rgba(255,178,36,.06)}
.card>.hd .t{font-weight:600;font-size:.87rem;letter-spacing:.3px}
.card>.hd .r{margin-left:auto;display:flex;gap:8px}
.card>.bd{padding:16px}

/* 表单控件 */
textarea,input[type=text],input[type=password],input[type=number],select{
  width:100%;background:var(--bg2);color:var(--txt);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:9px 11px;font-family:var(--mono);font-size:.833rem;line-height:1.6;transition:border-color .15s,box-shadow .15s}
textarea{min-height:118px;resize:vertical}
textarea::placeholder,input::placeholder{color:var(--faint)}
textarea:focus,input:focus,select:focus{
  outline:none;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-glow)}
select{cursor:pointer;font-family:var(--sans)}
label.f{display:flex;flex-direction:column;gap:6px;font-size:.78rem;color:var(--dim);font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mt{margin-top:13px}

/* 复选 */
.chk{display:flex;align-items:flex-start;gap:9px;font-size:.8rem;color:var(--dim);cursor:pointer;user-select:none;line-height:1.5}
.chk input{accent-color:var(--amber);width:16px;height:16px;margin-top:1px;flex:none;cursor:pointer}
.chk b{color:var(--amber);font-weight:500}

/* 按钮 */
button{font-family:var(--sans);cursor:pointer;transition:all .14s;border-radius:var(--r-sm);
  background:var(--panel3);color:var(--txt);border:1px solid var(--line2);padding:9px 16px;font-size:.84rem;font-weight:500}
button:hover:not(:disabled){border-color:var(--line2);background:var(--btn-hover);transform:translateY(-1px)}
button:active:not(:disabled){transform:translateY(0)}
button:focus-visible{outline:none;box-shadow:0 0 0 3px var(--amber-glow);border-color:var(--amber)}
button:disabled{opacity:.38;cursor:not-allowed}
button.primary{background:var(--amber);color:#1a1200;
  border-color:var(--amber);font-weight:650;box-shadow:0 2px 10px rgba(255,178,36,.22)}
button.primary:hover:not(:disabled){background:var(--amber-hi);box-shadow:0 4px 14px rgba(255,178,36,.25)}
button.ghost{background:transparent}
button.sm{padding:6px 12px;font-size:.78rem}
button.icon{display:inline-flex;align-items:center;gap:7px}
button.icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex:none}
.btnrow{display:flex;gap:10px;flex-wrap:wrap}

/* 标签页 */
.tabs{display:flex;gap:4px;padding:3px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:13px}
.tabs button{flex:1;border:none;background:none;border-radius:4px;padding:7px;color:var(--dim);font-weight:500}
.tabs button:hover:not(.on){background:var(--tab-hover);transform:none}
.tabs button.on{background:var(--panel3);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.3)}

.hint{font-size:.76rem;color:var(--faint);line-height:1.65;margin-top:9px}
.hint b{color:var(--dim);font-weight:500}
#loadInfo{font-size:.78rem;color:var(--green);font-family:var(--mono)}

/* 文件列选择 chips */
#colPick{display:none;margin-top:13px;padding-top:13px;border-top:1px dashed var(--line)}
#colPick>span{font-size:.76rem;color:var(--dim)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
.chips button.on{border-color:var(--amber);color:var(--amber);background:rgba(255,178,36,.08)}
input[type=file]{border:1px dashed var(--line2);background:var(--bg2);padding:11px;color:var(--dim);font-size:.8rem;font-family:var(--sans);cursor:pointer;border-radius:var(--r-sm)}
input[type=file]::file-selector-button{background:var(--panel3);color:var(--txt);border:1px solid var(--line2);
  border-radius:5px;padding:5px 11px;margin-right:11px;cursor:pointer;font-size:.78rem}

/* ============ 右侧结果区 ============ */
.result{display:flex;flex-direction:column;gap:16px}

/* 统计卡 */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--faint)}
.stat.c-ok::before{background:var(--green)} .stat.c-miss::before{background:var(--amber)}
.stat.c-err::before{background:var(--red)} .stat.c-done::before{background:var(--blue)}
.stat .v{font-size:1.65rem;font-weight:700;line-height:1;font-family:var(--mono)}
.stat .l{font-size:.72rem;color:var(--dim);margin-top:7px;letter-spacing:.3px}
.stat.c-ok .v{color:var(--green)} .stat.c-miss .v{color:var(--amber)}
.stat.c-err .v{color:var(--red)} .stat.c-done .v{color:var(--blue)}

/* 进度条 */
#pbar{height:5px;background:var(--line);border-radius:99px;overflow:hidden;display:none}
#pbar>div{height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--amber),var(--amber-hi));transition:width .3s ease;
  box-shadow:0 0 10px var(--amber-glow)}

/* 表格 */
.tblcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.tblcard>.hd{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--panel2),var(--panel))}
.tblcard>.hd .t{font-weight:600;font-size:.87rem;letter-spacing:.3px}
.tblcard>.hd .cnt{font-family:var(--mono);font-size:.75rem;color:var(--faint)}
.tblcard>.hd .r{margin-left:auto;display:flex;gap:8px}
.tblwrap{max-height:calc(100dvh - 320px);overflow:auto;position:relative}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.84rem}
thead th{position:sticky;top:0;z-index:2;background:var(--panel2);text-align:left;padding:11px 14px;
  font-size:.7rem;color:var(--dim);letter-spacing:.6px;font-weight:600;text-transform:uppercase;
  border-bottom:1px solid var(--line2);white-space:nowrap}
thead th::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--line2)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--row-line);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--row-hover)}
td.idx{font-family:var(--mono);color:var(--faint);font-size:.78rem;font-variant-numeric:tabular-nums;padding-top:13px}
td.addr{max-width:300px;word-break:break-word;color:var(--dim);line-height:1.55;font-size:.82rem}
td.mono{font-family:var(--mono);font-size:.78rem;font-variant-numeric:tabular-nums;letter-spacing:-.2px}

/* 状态徽章：图标+文字，不靠颜色单独区分 */
.st{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:500;
  padding:3px 9px 3px 7px;border-radius:20px;white-space:nowrap;border:1px solid transparent}
.st svg{width:12px;height:12px;flex:none}
.st.wait{color:var(--faint);border-color:var(--line2);background:var(--bg2)}
.st.run{color:var(--blue);border-color:var(--blue-dim);background:rgba(94,162,255,.08)}
.st.run svg{animation:spin 1s linear infinite}
.st.ok{color:var(--green);border-color:var(--green-dim);background:rgba(74,222,128,.08)}
.st.miss{color:var(--amber);border-color:var(--amber-dim);background:rgba(255,178,36,.08)}
.st.err{color:var(--red);border-color:var(--red-dim);background:rgba(255,107,107,.08)}
@keyframes spin{to{transform:rotate(360deg)}}

td select.cand{max-width:340px;width:100%;font-size:.82rem;padding:6px 9px}
td input.manual{max-width:340px;margin-top:7px;display:none;font-size:.82rem;padding:6px 9px}
td .meta{font-family:var(--mono);font-size:.72rem;color:var(--faint);margin-top:6px;line-height:1.6}
td .meta .k{color:var(--dim)}
td .reason{font-size:.76rem;color:var(--red);line-height:1.55;display:flex;gap:6px;align-items:flex-start}
td .reason svg{width:13px;height:13px;flex:none;margin-top:2px;stroke:var(--red);fill:none;stroke-width:2}
td .dash{color:var(--faint)}

/* 空状态 */
.empty{padding:56px 24px;text-align:center}
.empty .ico{width:52px;height:52px;margin:0 auto 16px;border-radius:14px;background:var(--panel2);
  display:grid;place-items:center;border:1px solid var(--line)}
.empty .ico svg{width:26px;height:26px;stroke:var(--faint);fill:none;stroke-width:1.6}
.empty .t{font-size:.92rem;color:var(--dim);font-weight:500}
.empty .s{font-size:.8rem;color:var(--faint);margin-top:7px;line-height:1.6}

/* skeleton */
.skl{background:linear-gradient(90deg,var(--skl-base) 25%,var(--skl-shine) 50%,var(--skl-base) 75%);background-size:200% 100%;
  animation:shimmer 1.3s infinite;border-radius:4px;height:12px;display:inline-block}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--panel3);border:1px solid var(--amber-dim);color:var(--txt);padding:11px 20px;
  border-radius:var(--r-sm);font-size:.84rem;opacity:0;pointer-events:none;z-index:99;box-shadow:var(--shadow);
  transition:opacity .2s,transform .2s;max-width:80vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 响应式收窄：窄屏回退单栏 */
@media(max-width:1120px){
  .layout{grid-template-columns:1fr}
  .side{position:static}
  .stats{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .tblwrap{max-height:none}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="hbar">
    <div class="logo">
      <div class="mark"><svg viewBox="0 0 24 24"><path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M12 12v9M3 7l9 5 9-5"/></svg></div>
      <h1>地址反查企业<span class="thin">/</span><span style="font-weight:400;color:var(--dim);font-size:.9rem">TYC Batch Lookup</span></h1>
    </div>
    <span class="tag">PVMaster → 天眼查 → 企业名</span>
    <button id="themeToggle" onclick="toggleTheme()" title="切换主题">
      <svg viewBox="0 0 24 24" id="themeIcon"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <span class="pstat"><span id="proxyDot"></span><span id="proxyTxt">检测代理…</span></span>
  </div>
</header>

<div class="layout">

  <!-- ============ 左侧：配置栏 ============ -->
  <aside class="side">

    <!-- 01 导入 -->
    <div class="card">
      <div class="hd"><span class="num">01</span><span class="t">导入地址</span>
        <span class="r"><span id="loadInfo"></span></span></div>
      <div class="bd">
        <div class="tabs">
          <button id="tabPaste" class="on" onclick="switchTab('paste')">粘贴文本</button>
          <button id="tabFile" onclick="switchTab('file')">Excel / CSV</button>
        </div>
        <div id="paneP">
          <textarea id="pasteBox" placeholder="每行一个地址，直接从 PVMaster 项目列表复制粘贴&#10;&#10;江苏省苏州市吴江区汾湖高新区莘七路1688号&#10;浙江省嘉兴市海宁市袁花镇双丰村工业园区…"></textarea>
        </div>
        <div id="paneF" style="display:none">
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
          <div id="colPick">
            <span>地址所在列：</span>
            <div class="chips" id="colChips"></div>
          </div>
        </div>
        <label class="chk mt"><input type="checkbox" id="optDedupe" checked>自动去重、去空行</label>
        <div class="btnrow mt">
          <button class="primary icon" onclick="loadAddresses()">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>载入地址</button>
        </div>
      </div>
    </div>

    <!-- 02 配置执行 -->
    <div class="card">
      <div class="hd"><span class="num">02</span><span class="t">配置与执行</span></div>
      <div class="bd">
        <label class="f">天眼查 Token<span style="color:var(--faint);font-weight:400"> · 开放平台 › 数据中心 › 我的接口</span>
          <input type="password" id="token" placeholder="粘贴 Token，仅保存在本机浏览器" autocomplete="off">
        </label>
        <div class="grid2 mt">
          <label class="f">请求间隔 (ms)
            <input type="number" id="interval" value="600" min="150" step="50" class="tnum">
          </label>
          <label class="f">代理地址
            <input type="text" id="proxyBase">
          </label>
        </div>
        <label class="chk mt"><input type="checkbox" id="optFallback" checked>
          <span>搜不到时，用去掉省市区前缀的短地址重试一次 <b>（无结果项 +1 次计费）</b></span></label>
        <div class="btnrow" style="margin-top:16px">
          <button class="primary icon" id="btnStart" onclick="startRun()" disabled>
            <svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z" fill="currentColor" stroke="none"/></svg>开始查询</button>
          <button class="icon ghost" id="btnPause" onclick="pauseRun()" disabled>
            <svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg>暂停</button>
          <button class="icon ghost" id="btnRetry" onclick="retryFailed()" disabled>
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>重试失败</button>
        </div>
        <p class="hint"><b>计费：</b>搜索接口按调用次数收费，每地址 1 次（开短地址重试的无结果项 2 次）。全程在本机浏览器 + 本地代理执行，Token 不上传第三方。</p>
      </div>
    </div>

  </aside>

  <!-- ============ 右侧：结果区 ============ -->
  <main class="result">

    <div class="stats">
      <div class="stat"><div class="v tnum" id="sTotal">0</div><div class="l">总地址</div></div>
      <div class="stat c-done"><div class="v tnum" id="sDone">0</div><div class="l">已处理</div></div>
      <div class="stat c-ok"><div class="v tnum" id="sOk">0</div><div class="l">已匹配</div></div>
      <div class="stat c-miss"><div class="v tnum" id="sMiss">0</div><div class="l">无结果</div></div>
      <div class="stat c-err"><div class="v tnum" id="sErr">0</div><div class="l">失败</div></div>
    </div>

    <div id="pbar"><div></div></div>

    <div class="tblcard">
      <div class="hd">
        <span class="t">查询结果</span>
        <span class="cnt" id="tblCnt"></span>
        <span class="r">
          <button class="sm icon" onclick="exportXLSX()">
            <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>导出 Excel</button>
          <button class="sm ghost icon" onclick="exportCSV()">导出 CSV</button>
        </span>
      </div>
      <div class="tblwrap">
        <table>
          <thead><tr>
            <th style="width:48px">#</th>
            <th style="min-width:220px">项目地址</th>
            <th style="width:100px">状态</th>
            <th style="min-width:280px">匹配企业 · 可切换候选 / 手动改</th>
            <th style="width:180px">统一社会信用代码</th>
            <th style="width:96px">法定代表人</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ================= 主题切换 ================= */
(function initTheme(){
  var saved = store('a2c_theme');
  if(saved === 'dark'){
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  updateThemeIcon(saved === 'dark');
})();
function toggleTheme(){
  var isDark = document.documentElement.hasAttribute('data-theme');
  if(isDark){
    document.documentElement.removeAttribute('data-theme');
  }else{
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  store('a2c_theme', isDark ? 'light' : 'dark');
  updateThemeIcon(isDark);
}
function updateThemeIcon(isDark){
  var icon = document.getElementById('themeIcon');
  if(!icon) return;
  if(isDark){
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }else{
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
  }
}

/* ================= 状态 ================= */
var rows = [];            // {addr, status, items[], sel, manual, reason, mode}
var running = false, paused = false;
var fileMatrix = null, fileHeaders = null, fileColIdx = -1;

var MANUAL = '__manual__';

/* 状态徽章：图标 + 文字（不单靠颜色区分，满足可访问性 color-not-only） */
var ST_LABEL = {wait:'待查', run:'查询中', ok:'已匹配', miss:'无结果', err:'失败'};
var ST_ICON = {
  wait:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  run:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.2-8.5"/></svg>',
  ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>',
  miss:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  err:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 8v5M12 16.5v.5"/><path d="M10.3 3.9 2.4 18a2 2 0 0 0 1.7 3h15.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>'
};

/* ================= 工具 ================= */
function $(id){ return document.getElementById(id); }
function toast(msg, ms){
  var t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(function(){ t.classList.remove('show'); }, ms||3000);
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function store(k,v){ try{ if(v===undefined) return localStorage.getItem(k); localStorage.setItem(k,v);}catch(e){ return null; } }

/* 默认代理地址：如果页面本身由 proxy.py 托管，用同源；否则默认 127.0.0.1:8765 */
(function(){
  var base = (location.protocol.indexOf('http')===0) ? location.origin : 'http://127.0.0.1:8765';
  $('proxyBase').value = store('a2c_proxy') || base;
  var tk = store('a2c_token'); if(tk) $('token').value = tk;
  pingProxy();
  renderTable();
})();
$('proxyBase').addEventListener('change', function(){ store('a2c_proxy', this.value.trim()); pingProxy(); });
$('token').addEventListener('change', function(){ store('a2c_token', this.value.trim()); });

function pingProxy(){
  var dot = $('proxyDot'), txt = $('proxyTxt');
  fetch($('proxyBase').value.replace(/\/$/,'') + '/ping', {method:'GET'})
    .then(function(r){ return r.json(); })
    .then(function(){ dot.className='ok'; txt.textContent='代理在线'; })
    .catch(function(){ dot.className='bad'; txt.textContent='代理未启动'; });
}

/* ================= 导入 ================= */
function switchTab(t){
  $('tabPaste').className = t==='paste'?'on':'';
  $('tabFile').className  = t==='file'?'on':'';
  $('paneP').style.display = t==='paste'?'':'none';
  $('paneF').style.display = t==='file'?'':'none';
}

$('fileInput').addEventListener('change', function(){
  var f = this.files[0]; if(!f) return;
  if(typeof XLSX === 'undefined'){ toast('Excel 解析库加载失败（网络问题），请改用粘贴文本'); return; }
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var wb = XLSX.read(e.target.result, {type:'array'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      fileMatrix = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if(!fileMatrix.length){ toast('文件是空的'); return; }
      fileHeaders = fileMatrix[0].map(function(h,i){ return String(h||('列'+(i+1))); });
      var chips = $('colChips'); chips.innerHTML=''; fileColIdx = -1;
      fileHeaders.forEach(function(h,i){
        var b = document.createElement('button'); b.className='sm'; b.textContent = h;
        // 自动猜地址列
        if(/地址|地点|address|位置/i.test(h) && fileColIdx===-1){ fileColIdx=i; b.className='sm on'; }
        b.onclick = function(){
          fileColIdx = i;
          Array.prototype.forEach.call(chips.children, function(c){ c.className='sm'; });
          b.className='sm on';
        };
        chips.appendChild(b);
      });
      $('colPick').style.display='block';
      toast('已读取 ' + (fileMatrix.length-1) + ' 行，请确认地址列');
    }catch(err){ toast('解析失败：' + err.message); }
  };
  reader.readAsArrayBuffer(f);
});

function loadAddresses(){
  var list = [];
  var isPaste = $('paneP').style.display !== 'none';
  if(isPaste){
    list = $('pasteBox').value.split(/\r?\n/);
  }else{
    if(!fileMatrix){ toast('先选择文件'); return; }
    if(fileColIdx < 0){ toast('先点选地址所在列'); return; }
    list = fileMatrix.slice(1).map(function(r){ return String(r[fileColIdx]||''); });
  }
  list = list.map(function(s){ return s.trim(); }).filter(Boolean);
  if($('optDedupe').checked){
    var seen = {}; list = list.filter(function(a){ if(seen[a]) return false; seen[a]=1; return true; });
  }
  if(!list.length){ toast('没有有效地址'); return; }
  rows = list.map(function(a){ return {addr:a, status:'wait', items:[], sel:0, manual:'', reason:'', mode:''}; });
  renderTable(); refreshStats();
  $('btnStart').disabled = false;
  $('loadInfo').textContent = '+ ' + rows.length + ' 条';
}

/* ================= 查询 ================= */
function tycSearch(word){
  var base = $('proxyBase').value.trim().replace(/\/$/,'');
  var url = base + '/tyc/services/open/search/2.0?pageSize=5&pageNum=1&word=' + encodeURIComponent(word);
  return fetch(url, {headers:{'X-TYC-Token': $('token').value.trim()}})
    .then(function(r){ return r.json(); });
}

/* 去掉省/市/区县前缀，取地址核心段做二次检索 */
function shortAddr(a){
  var s = a, prev;
  do {
    prev = s;
    s = s.replace(/^.{2,8}?(省|自治区)/,'')
         .replace(/^.{2,8}?市/,'')
         .replace(/^.{1,8}?(区|县|旗|市)/,'')
         .replace(/^.{1,6}?(街道|镇|乡)/,'');
  } while (s !== prev);
  s = s.trim();
  return (s && s !== a && s.length >= 3) ? s : null;
}

function startRun(){
  if(!$('token').value.trim()){ toast('先填 Token'); return; }
  if(running){ return; }
  running = true; paused = false;
  $('btnStart').disabled = true; $('btnPause').disabled = false;
  $('pbar').style.display = 'block';
  loop();
}
function pauseRun(){
  paused = !paused;
  $('btnPause').lastChild.textContent = paused ? '继续' : '暂停';
  if(!paused) loop();
}
function retryFailed(){
  rows.forEach(function(r){ if(r.status==='err') { r.status='wait'; r.reason=''; } });
  renderTable(); refreshStats();
  if(!running) startRun(); else if(paused) pauseRun();
}

function nextIdx(){
  for(var i=0;i<rows.length;i++) if(rows[i].status==='wait') return i;
  return -1;
}

function loop(){
  if(paused || !running) return;
  var i = nextIdx();
  if(i === -1){
    running = false;
    $('btnStart').disabled = false; $('btnPause').disabled = true;
    $('btnPause').lastChild.textContent = '暂停';
    $('btnRetry').disabled = !rows.some(function(r){ return r.status==='err'; });
    toast('查询完成');
    return;
  }
  var row = rows[i];
  row.status = 'run'; renderRow(i);
  queryOne(row).then(function(){
    renderRow(i); refreshStats();
    setTimeout(loop, Math.max(150, parseInt($('interval').value,10)||600));
  });
}

function queryOne(row){
  return tycSearch(row.addr).then(function(data){
    return handleResp(row, data, '全地址');
  }).then(function(done){
    if(done) return;
    // 无结果 → 短地址重试
    var s = $('optFallback').checked ? shortAddr(row.addr) : null;
    if(!s){ row.status = 'miss'; return; }
    return tycSearch(s).then(function(d2){
      return handleResp(row, d2, '短地址「' + s + '」');
    }).then(function(done2){ if(!done2) row.status = 'miss'; });
  }).catch(function(e){
    row.status = 'err';
    row.reason = '网络/代理错误: ' + e.message;
  });
}

/* 返回 true = 该行已定论（成功或硬失败），false = 无结果可继续 fallback */
function handleResp(row, data, mode){
  if(!data || typeof data.error_code === 'undefined'){
    row.status='err'; row.reason='返回格式异常'; return true;
  }
  if(data.error_code !== 0){
    // 常见：token 无效 / 余额不足 / 无数据
    var reason = data.reason || ('error_code ' + data.error_code);
    if(/无数据|not found|无结果/i.test(reason)) return false;   // 当作无结果，允许 fallback
    row.status='err'; row.reason=reason;
    if(/token|授权|认证|余额|欠费|次数/i.test(reason)){
      toast('接口报错：' + reason + '（已暂停，检查 Token / 余额）', 5000);
      paused = true; $('btnPause').lastChild.textContent='继续'; $('btnPause').disabled=false;
    }
    return true;
  }
  var items = (data.result && data.result.items) || [];
  if(!items.length) return false;
  row.items = items.slice(0,5).map(function(it){
    return {
      name: stripEm(it.name),
      creditCode: it.creditCode || '',
      legalPersonName: it.legalPersonName || '',
      base: it.base || '',
      regStatus: it.regStatus || ''
    };
  });
  row.sel = 0; row.status = 'ok'; row.mode = mode;
  return true;
}
/* 天眼查搜索结果 name 里可能带 <em> 高亮标签 */
function stripEm(s){ return String(s||'').replace(/<\/?em>/g,''); }

/* ================= 渲染 ================= */
function stBadge(status){
  return '<span class="st '+status+'">'+ST_ICON[status]+ST_LABEL[status]+'</span>';
}

function renderTable(){
  var tb = $('tbody');
  $('tblCnt').textContent = rows.length ? (rows.length + ' 条') : '';
  if(!rows.length){
    tb.innerHTML = '<tr><td colspan="6">'+
      '<div class="empty">'+
        '<div class="ico"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>'+
        '<div class="t">还没有地址</div>'+
        '<div class="s">在左侧「导入地址」粘贴或上传，然后填 Token 开始查询</div>'+
      '</div></td></tr>';
    return;
  }
  tb.innerHTML = rows.map(function(r,i){ return rowHTML(r,i); }).join('');
}
function renderRow(i){
  var tr = document.getElementById('r'+i);
  if(tr) tr.outerHTML = rowHTML(rows[i], i);
  var bar = $('pbar').firstElementChild;
  var done = rows.filter(function(r){ return r.status!=='wait' && r.status!=='run'; }).length;
  bar.style.width = (rows.length ? done/rows.length*100 : 0) + '%';
}
function rowHTML(r,i){
  var cur = current(r);
  var candCell = '';
  if(r.items.length || r.manual){
    var opts = r.items.map(function(it,k){
      return '<option value="'+k+'"'+(r.sel===k&&!r.manual?' selected':'')+'>'+esc(it.name)+
             (it.regStatus?'（'+esc(it.regStatus)+'）':'')+'</option>';
    }).join('');
    opts += '<option value="'+MANUAL+'"'+(r.manual?' selected':'')+'>✎ 手动输入…</option>';
    candCell = '<select class="cand" onchange="onSel('+i+',this.value)">'+opts+'</select>'+
      '<input class="manual" type="text" placeholder="手动输入企业名" value="'+esc(r.manual)+'"'+
      (r.manual?' style="display:block"':'')+' onchange="rows['+i+'].manual=this.value;renderRow('+i+')">'+
      (r.mode?'<div class="meta"><span class="k">命中:</span> '+esc(r.mode)+' · <span class="k">候选</span> '+r.items.length+
        (cur&&cur.base?' · '+esc(cur.base):'')+'</div>':'');
  }else if(r.status==='err'){
    candCell = '<div class="reason"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16.5v.5"/></svg><span>'+esc(r.reason)+'</span></div>';
  }else if(r.status==='miss'){
    candCell = '<select class="cand" onchange="onSel('+i+',this.value)"><option value="">— 无匹配 —</option>'+
      '<option value="'+MANUAL+'">✎ 手动输入…</option></select>'+
      '<input class="manual" type="text" placeholder="手动输入企业名" onchange="rows['+i+'].manual=this.value;renderRow('+i+')">';
  }else if(r.status==='run'){
    candCell = '<span class="skl" style="width:70%"></span>';
  }else{
    candCell = '<span class="dash">—</span>';
  }
  return '<tr id="r'+i+'">'+
    '<td class="idx">'+(i+1)+'</td>'+
    '<td class="addr">'+esc(r.addr)+'</td>'+
    '<td>'+stBadge(r.status)+'</td>'+
    '<td>'+candCell+'</td>'+
    '<td class="mono">'+(cur&&cur.creditCode?esc(cur.creditCode):'<span class="dash">—</span>')+'</td>'+
    '<td>'+(cur&&cur.legalPersonName?esc(cur.legalPersonName):'<span class="dash">—</span>')+'</td>'+
  '</tr>';
}
function onSel(i,v){
  var r = rows[i];
  if(v===MANUAL){ renderRowManual(i); return; }
  r.manual=''; r.sel = parseInt(v,10)||0; renderRow(i);
}
function renderRowManual(i){
  var tr = document.getElementById('r'+i);
  if(!tr) return;
  var inp = tr.querySelector('input.manual');
  if(inp){ inp.style.display='block'; inp.focus(); }
}
function current(r){
  if(r.manual) return {name:r.manual, creditCode:'', legalPersonName:'', base:''};
  return r.items[r.sel] || null;
}
function refreshStats(){
  var c = {ok:0,miss:0,err:0,done:0};
  rows.forEach(function(r){
    if(r.status==='ok')c.ok++; if(r.status==='miss')c.miss++; if(r.status==='err')c.err++;
    if(r.status!=='wait'&&r.status!=='run')c.done++;
  });
  $('sTotal').textContent=rows.length; $('sDone').textContent=c.done;
  $('sOk').textContent=c.ok; $('sMiss').textContent=c.miss; $('sErr').textContent=c.err;
  $('btnRetry').disabled = !c.err;
}

/* ================= 导出 ================= */
function exportRows(){
  return rows.map(function(r,i){
    var cur = current(r);
    return {
      '序号': i+1,
      '项目地址': r.addr,
      '企业名称': cur ? cur.name : '',
      '统一社会信用代码': cur ? cur.creditCode : '',
      '法定代表人': cur ? cur.legalPersonName : '',
      '省份': cur ? (cur.base||'') : '',
      '状态': ST_LABEL[r.status],
      '命中方式': r.manual ? '手动' : (r.mode||''),
      '候选数': r.items.length
    };
  });
}
function exportXLSX(){
  if(!rows.length){ toast('没有数据'); return; }
  if(typeof XLSX === 'undefined'){ toast('Excel 库未加载，用 CSV 导出'); return exportCSV(); }
  var ws = XLSX.utils.json_to_sheet(exportRows());
  ws['!cols'] = [{wch:6},{wch:44},{wch:34},{wch:22},{wch:12},{wch:8},{wch:8},{wch:22},{wch:8}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '地址反查结果');
  XLSX.writeFile(wb, '地址反查企业_' + ts() + '.xlsx');
}
function exportCSV(){
  if(!rows.length){ toast('没有数据'); return; }
  var data = exportRows();
  var keys = Object.keys(data[0]);
  var lines = [keys.join(',')].concat(data.map(function(o){
    return keys.map(function(k){ 
      var v = String(o[k]==null?'':o[k]);
      return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
    }).join(',');
  }));
  var blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '地址反查企业_' + ts() + '.csv';
  a.click();
}
function ts(){
  var d = new Date();
  function p(n){ return (n<10?'0':'')+n; }
  return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes());
}
</script>
</body>
